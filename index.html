<title>Preferansz</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:#082808;font-family:Georgia,serif;color:#fff;overscroll-behavior:none;}

<body>
<div id="app"><div style="color:#a5d6a7;text-align:center;padding:60px 20px;font-size:14px;">Betöltés...</div></div>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script>
// ═══ ÁLLANDÓK ═══════════════════════════════════════════════
const SUITS=['zold','sarga','piros','makk'];
const SI={
  zold:{n:'Zöld',col:'#2e7d32',dark:'#1b5e20'},
  sarga:{n:'Sárga',col:'#e65100',dark:'#bf360c'},
  piros:{n:'Piros',col:'#c62828',dark:'#7f0000'},
  makk:{n:'Makk',col:'#5d3a1a',dark:'#3e2006'}
};
const VALS=['7','8','9','10','A','F','K','Á'];
const VR={'7':0,'8':1,'9':2,'10':3,'A':4,'F':5,'K':6,'Á':7};

// Játékok: id = licit érték, n = név, trump = tromf szín (null=nincs), tp = típus, tgt = cél vitelek
const GAMES=[
  {id:2,n:'Zöld',trump:'zold',tp:'color',tgt:6},
  {id:3,n:'Sárga',trump:'sarga',tp:'color',tgt:6},
  {id:4,n:'Piros',trump:'piros',tp:'color',tgt:6},
  {id:5,n:'Makk',trump:'makk',tp:'color',tgt:6},
  {id:6,n:'Betli',trump:null,tp:'betli',tgt:0},
  {id:7,n:'Mizer',trump:null,tp:'mizer',tgt:1},
  {id:8,n:'Szanadu',trump:null,tp:'szanadu',tgt:6},
  {id:9,n:'Pikkoló',trump:null,tp:'pikkolo',tgt:2},
  {id:10,n:'Preferansz',trump:null,tp:'preferansz',tgt:6}
];
const G='#1b5e20',DG='#082808';

// ═══ HÁLÓZAT ════════════════════════════════════════════════
let peer=null, isHost=false, myIndex=0;
let pNames=['Gazda','Vendég 1','Vendég 2'];
let roomCode='';
let pConns=[null,null,null];
let hostConn=null;
let netPhase='lobby';
let joinedCount=0;
let myNameInput='', joinCodeInput='';
let netError='';
let showRules=false;

function genCode(){return Math.random().toString(36).slice(2,8).toUpperCase();}

function doHost(name){
  myNameInput=name; pNames[0]=name;
  isHost=true; myIndex=0; netError='';
  roomCode=genCode();
  netPhase='hosting';
  _makePeer(roomCode);
}

function _makePeer(id){
  if(peer){try{peer.destroy();}catch(e){}}
  peer=new Peer(id,{debug:0});
  peer.on('error',err=>{
    if(err.type==='unavailable-id'&&isHost){roomCode=genCode();_makePeer(roomCode);}
    else{netError='Hálózati hiba: '+err.message;netPhase='lobby';render();}
  });
  peer.on('open',()=>{render();});
  if(isHost){
    peer.on('connection',conn=>{
      conn.on('open',()=>{
        conn.on('data',data=>{
          if(data.type==='hello'){
            if(joinedCount>=2){conn.close();return;}
            const idx=joinedCount+1; joinedCount++;
            pNames[idx]=data.name; pConns[idx]=conn;
            conn.metadata={idx};
            conn.send({type:'welcome',myIndex:idx,names:pNames});
            _broadcastPlayers();
            if(joinedCount===2){netPhase='ready';}
            render();
          } else if(data.type==='action'){
            _handleAction(data.action, conn.metadata?.idx||_connIdx(conn));
          }
        });
        conn.on('close',()=>{netPhase='disconnected';render();});
      });
    });
  }
}

function _connIdx(c){return pConns.indexOf(c);}

function doJoin(name,code){
  myNameInput=name; netError='';
  isHost=false; netPhase='joining';
  render();
  if(peer){try{peer.destroy();}catch(e){}}
  peer=new Peer(undefined,{debug:0});
  peer.on('error',err=>{netError='Nem sikerült csatlakozni! Ellenőrizd a kódot.';netPhase='lobby';render();});
  peer.on('open',()=>{
    hostConn=peer.connect(code.trim().toUpperCase(),{reliable:true});
    hostConn.on('open',()=>{hostConn.send({type:'hello',name});});
    hostConn.on('data',data=>{
      if(data.type==='welcome'){myIndex=data.myIndex;pNames=data.names;netPhase='waiting';render();}
      else if(data.type==='players'){pNames=data.names;render();}
      else if(data.type==='state'){state=data.state;pNames=data.names||pNames;netPhase='playing';render();}
    });
    hostConn.on('close',()=>{netPhase='disconnected';render();});
  });
}

function _broadcastPlayers(){
  [1,2].forEach(i=>{if(pConns[i]&&pConns[i].open)pConns[i].send({type:'players',names:pNames});});
}
function broadcastState(){
  if(!isHost)return;
  const msg={type:'state',state,names:pNames};
  [1,2].forEach(i=>{if(pConns[i]&&pConns[i].open)pConns[i].send(msg);});
}
function sendAction(action){
  if(isHost){_handleAction(action,0);}
  else if(hostConn&&hostConn.open){hostConn.send({type:'action',action});}
}
function _handleAction(action,fromIdx){
  if(!isHost)return;
  const s=state;
  if(action.kind==='bid'&&s.phase==='bid'&&s.bidder===fromIdx){processBid(fromIdx,action.amount);}
  else if(action.kind==='play'&&s.phase==='play'&&s.curP===fromIdx){
    const card=s.hands[fromIdx].find(c=>c.id===action.cardId);
    if(card)_doPlay(fromIdx,card);
  } else if(action.kind==='discard'&&s.phase==='discard'&&s.bidWinner===fromIdx){
    _doDiscard(action.cardId);
  } else if(action.kind==='pickGame'&&s.phase==='selectGame'&&s.bidWinner===fromIdx){
    const g=GAMES.find(g=>g.id===action.gameId);
    if(g)_doPickGame(g);
  } else if(action.kind==='earlyBid'&&s.phase==='bid'&&s.bidder===fromIdx){
    _doEarlyBid(fromIdx,action.gameId);
  }
}

// ═══ JÁTÉK ÁLLAPOT ══════════════════════════════════════════
// scores: saját pontszám (fent, negatívból indul)
// cellar: "pince" sorok [{from:i, to:j, val:x}] – j játékosra i játékostól írt érték
// startScore: megegyezés szerinti kezdőpont
let state={
  phase:'result',
  hands:[[],[],[]],
  talon:[],
  bidder:0,
  highBid:0,
  highBidder:null,
  passed:[false,false,false],
  activeCnt:3,
  game:null,
  bidWinner:null,
  trick:[],
  tw:[0,0,0],
  curP:0,
  msg:'',
  scores:[-10,-10,-10],
  cellar:[], // [{from,to,val}]
  log:[],
  showTalon:false,
  liftedCard:null,
  resultMsg:'Üdvözlet! A gazda indítja az első kört.',
  passCount:0, // körpasszok száma
  dealerIdx:0, // ki az osztó
  startScore:-10,
  round:0
};

function addLog(m){state.log=[m,...state.log].slice(0,20);}
function after(){render();broadcastState();}

function startRound(){
  if(!isHost)return;
  const deck=_shuffle(_mkDeck());
  const r=state.round+1;
  const dealer=state.dealerIdx;
  addLog(`── ${r}. kör · Osztó: ${pNames[dealer]} ──`);
  // Kiosztás: először 5-5 lap, talon, majd maradék 5-5
  const h0=deck.slice(0,5), h1=deck.slice(5,10), h2=deck.slice(10,15);
  const talon=deck.slice(15,17);
  const h0b=deck.slice(17,22), h1b=deck.slice(22,27), h2b=deck.slice(27,32);
  // Licitálást az osztótól jobbra ülő kezdi (= (dealer+1)%3)
  const firstBidder=(dealer+1)%3;
  state={...state,
    phase:'bid',
    hands:[[...h0,...h0b],[...h1,...h1b],[...h2,...h2b]],
    talon,
    bidder:firstBidder,
    highBid:0,
    highBidder:null,
    passed:[false,false,false],
    activeCnt:3,
    game:null,
    bidWinner:null,
    trick:[],
    tw:[0,0,0],
    showTalon:false,
    liftedCard:null,
    resultMsg:'',
    round:r,
    trickHistory:[], // [{winner, trickNum}] – Mizer/Pikkoló ellenőrzéshez
    lastTrickWinner:null,
    msg:`${pNames[firstBidder]} licitál...`
  };
  after();
}

// ═══ LICITÁLÁS ══════════════════════════════════════════════
function processBid(pl,amount){
  const np=[...state.passed];
  let nHB=state.highBid,nHBr=state.highBidder,nAct=state.activeCnt;
  if(amount){
    nHB=amount; nHBr=pl;
    addLog(`${pNames[pl]}: ${amount} – ${GAMES.find(g=>g.id===amount)?.n||''}`);
  } else {
    np[pl]=true; nAct--;
    addLog(`${pNames[pl]}: Passz`);
  }
  state={...state,passed:np,highBid:nHB,highBidder:nHBr,activeCnt:nAct};
  // Ha mindenki passzolt vagy elérte a 10-et
  if(nAct===0||(nAct<=1&&nHBr!==null)||nHB>=10){_resolveAuction(nHBr,nHB);return;}
  let nx=(pl+1)%3; while(np[nx])nx=(nx+1)%3;
  state={...state,bidder:nx,msg:`${pNames[nx]} licitál...`};
  after();
}

// Korai licit (első 5 lap után, értéke duplázódik, talon nem vehető fel)
function _doEarlyBid(pl,gameId){
  const g=GAMES.find(x=>x.id===gameId);
  if(!g)return;
  addLog(`${pNames[pl]}: JÁTÉK – ${g.n} (dupla érték, talon nélkül)`);
  // Ha valaki már mondott korai licitet, az kell legyen nagyobb
  // Egyszerűsítés: elfogadjuk, ha nagyobb mint a jelenlegi highBid
  if(gameId<=state.highBid){
    state={...state,msg:'⚠️ Nagyobbat kell mondani!'};after();return;
  }
  // A korai játékos megnyeri a licitet, de nem veszi fel a talont; érték dupla
  const modG={...g,id:g.id*2,earlyBid:true};
  const nh=state.hands.map(h=>[...h]);
  // Talon marad, de a játékos nem veszi fel
  addLog(`${pNames[pl]} nyerte (korai, dupla: ${modG.id})`);
  state={...state,game:modG,bidWinner:pl,showTalon:false,liftedCard:null};
  // Talon latható mindenkivel
  state={...state,showTalon:true,msg:`${pNames[pl]} korai játékot vállalt: ${g.n} (dupla). Talon látható!`,phase:'earlyDiscard'};
  after();
  // 2s múlva elkezdik dobni
  setTimeout(()=>{
    // A játékosnak nincs mit dobnia (nem vette fel a talont), egyből játék
    const sp=g.tp==='color'?((pl+1)%3):((pl+2)%3);
    state={...state,showTalon:false,curP:sp,phase:'play',msg:`${g.n} (dupla) – ${pNames[sp]} kezd!`};
    after();
  },2500);
}

function _resolveAuction(winner,winBid){
  if(winner===null||winner===undefined){
    // KÖRPASSZ
    addLog('Körpassz!');
    // Osztó kijátsza egymás után a 2 talonlapját
    state={...state,
      phase:'passRound',
      bidWinner:null,
      showTalon:true,
      msg:'Körpassz! Az osztó kijátsza a talon 2 lapját...',
      passCount:state.passCount+1
    };
    after();
    setTimeout(()=>_playPassRound(),2000);
    return;
  }
  state={...state,bidWinner:winner,showTalon:true};
  addLog(`${pNames[winner]} nyerte a licitet (${winBid} – ${GAMES.find(g=>g.id>=winBid)?.n})`);
  state={...state,msg:`${pNames[winner]} megnézi a talont! Válasszon játékot.`,phase:'selectGame'};
  after();
}

function _playPassRound(){
  // Körpasszban az osztó kijátsza a talon 2 lapját, mindenki látja
  // A vitelek normálisan zajlanak, de az a cél, hogy minél KEVESEBB vitel legyen
  // Egyszerűsítés: az osztó feltárja a talont, majd azokat az asztalra rakjuk
  // A körpassz pontszámolása: elvitt viteleket levonják a saját pontból
  // Ehhez szimuláljuk: a talon 2 lapja az osztó nevében kerül ki
  const dealer=state.dealerIdx;
  const talonCards=[...state.talon];
  // Hozzáadjuk a talon lapjait az osztó kezéhez
  const nh=state.hands.map((h,i)=>i===dealer?[...h,...talonCards]:h);
  state={...state,hands:nh,talon:[],showTalon:false,
    phase:'play',curP:dealer,
    game:{id:0,n:'Körpassz',trump:null,tp:'passround',tgt:0},
    msg:`Körpassz – ${pNames[dealer]} (osztó) kezd!`
  };
  after();
}

function _doPickGame(g){
  const nh=state.hands.map(h=>[...h]);
  const bw=state.bidWinner;
  nh[bw]=[...nh[bw],...state.talon];
  addLog(`Játék: ${g.n} (${pNames[bw]})`);
  state={...state,game:g,hands:nh,showTalon:false,liftedCard:null,
    phase:'discard',msg:`${pNames[bw]} eldob 2 lapot...`};
  after();
}

function _doDiscard(cardId){
  const nh=state.hands.map(h=>[...h]);
  const bw=state.bidWinner;
  nh[bw]=nh[bw].filter(c=>c.id!==cardId);
  if(nh[bw].length===10){
    // Színjátéknál az első osztottnál kezd (= osztótól jobbra ülő)
    // Egyéb játéknál a licitnyertes előtti játékos (= licitnyertes-1)
    const g=state.game;
    let sp;
    if(g.tp==='color'){
      sp=(state.dealerIdx+1)%3;
    } else {
      sp=((bw-1)+3)%3;
    }
    state={...state,hands:nh,liftedCard:null,curP:sp,phase:'play',
      msg:`${g.n} – ${pNames[sp]} kezd!`};
  } else {
    state={...state,hands:nh,liftedCard:null,
      msg:`${pNames[state.bidWinner]}: még ${nh[state.bidWinner].length-10} lapot dob el`};
  }
  after();
}

// ═══ JÁTÉKSZABÁLYOK – LAP VALIDÁCIÓ ═══════════════════════
function _isValidPlay(pl,card){
  const s=state;
  const g=s.game;
  if(!g)return true;
  const trick=s.trick;
  if(trick.length===0)return true; // első játékos mindig mehet
  const leadSuit=trick[0].card.s;
  const hand=s.hands[pl];
  const hasSuit=hand.some(c=>c.s===leadSuit);
  if(hasSuit&&card.s!==leadSuit){return false;} // kötelező színre
  if(!hasSuit&&g.tp==='color'&&g.trump){
    const hasTrump=hand.some(c=>c.s===g.trump);
    if(hasTrump&&card.s!==g.trump){return false;} // kötelező tromf
  }
  return true;
}

// Pikkoló: az egymás utáni vitelek tiltottak
function _pikkoloCheckValid(pl,card){
  const s=state;
  // Ha az előző vitelünk volt, nem vihetünk rögtön
  if(s.lastTrickWinner===pl&&s.tw[pl]>0){
    // Nem rakhatja ki azt a lapot ami kötelezné a vitelre – de a kézből bármit megtehet
    // Valójában: játszhat bármit, de a szabály a vitelekre vonatkozik (nem a kijátszásra)
    // Pikkoló: nem VIHET egymás utáni vitelt
    // Ez azt jelenti, ha az előző vitelt ő vitte, most úgy kell játszani, hogy valaki más vigyen
    // A játékos bármit kijátszhat, de nem törekszik vitelre - ez nem korlátozza a kijátszást
  }
  return true;
}

// ═══ MENET LOGIKA ════════════════════════════════════════════
function _doPlay(pl,card){
  const nh=state.hands.map((h,i)=>i===pl?h.filter(c=>c.id!==card.id):h);
  const nt=[...state.trick,{pl,card}];
  state={...state,hands:nh,trick:nt,liftedCard:null};
  if(nt.length<3){
    const nx=(pl+1)%3;
    state={...state,curP:nx,msg:`${pNames[nx]} köre...`};
    after();return;
  }
  // Menet vége
  const w=_trickWinner(nt,state.game?.trump,state.game?.tp);
  const nTW=[...state.tw]; nTW[w]++;
  const trickNum=nTW[0]+nTW[1]+nTW[2]; // hányadik menet végzett
  const nHistory=[...(state.trickHistory||[]),{winner:w,trickNum}];
  addLog(`${pNames[w]} viszi → [${nTW.map((t,i)=>pNames[i][0]+':'+t).join(' ')}]`);
  state={...state,tw:nTW,lastTrickWinner:w,trickHistory:nHistory};

  if(nh[0].length===0&&nh[1].length===0&&nh[2].length===0){
    state={...state,phase:'evaluating',trick:nt,msg:'Utolsó menet...'};
    after();
    setTimeout(()=>{state={...state,trick:[]};_evalGame(nTW);},1800);
  } else {
    state={...state,phase:'between'};
    after();
    setTimeout(()=>{state={...state,trick:[],curP:w,phase:'play',msg:`${pNames[w]} kezd...`};after();},1500);
  }
}

function _trickWinner(trick,trump,gameType){
  const lead=trick[0].card.s;
  return trick.reduce((best,cur)=>{
    const bs=best.card.s, cs=cur.card.s;
    let bp=0,cp=0;
    if(trump){
      bp=(bs===trump?200:bs===lead?10:0)+VR[best.card.v];
      cp=(cs===trump?200:cs===lead?10:0)+VR[cur.card.v];
    } else {
      bp=(bs===lead?10:0)+VR[best.card.v];
      cp=(cs===lead?10:0)+VR[cur.card.v];
    }
    return cp>bp?cur:best;
  }).pl;
}

// ═══ PONTOZÁS ════════════════════════════════════════════════
// scores[i] = saját pontszám (fent), negatívból indul, 0-ra kell eljutni
// cellar = [{from, to, val}] pince bejegyzések
// Végső pontszám: saját pontszám – (mások által rám írt pince összege / 100)

function _evalGame(finalTW){
  const bw=state.bidWinner;
  const g=state.game;
  const got=bw!==null?finalTW[bw]:0;
  let resultText='';
  const ns=[...state.scores];
  const newCellar=[...state.cellar];

  if(g.tp==='passround'){
    // Körpassz: elvitt vitelek számát kivonják a saját pontból
    finalTW.forEach((tw,i)=>{
      ns[i]=ns[i]-tw;
    });
    resultText=`Körpassz vége. Vitelek: ${finalTW.map((t,i)=>pNames[i][0]+':'+t).join(', ')}`;
    addLog(resultText);
  } else {
    let won=false;
    const gameVal=g.id; // Korai liciten már dupla van benne

    if(g.tp==='color'||g.tp==='szanadu'||g.tp==='preferansz'){
      won=got>=g.tgt;
    } else if(g.tp==='betli'){won=got===0;}
    else if(g.tp==='mizer'){won=got===1&&!_mizerFirstOrLast(finalTW,bw);}
    else if(g.tp==='pikkolo'){won=got===2&&_pikkoloValid(bw);}

    if(won){
      ns[bw]=Math.min(0,ns[bw]+gameVal);
      const opp=[0,1,2].filter(i=>i!==bw);
      opp.forEach(o=>{
        const oppTw=finalTW[o];
        const v=oppTw*gameVal;
        if(v>0)newCellar.push({from:bw,to:o,val:v});
      });
      if(g.tp==='betli') resultText=`✓ ${pNames[bw]} MEGNYERTE: ${g.n} (0 vitel – tökéletes!)`;
      else if(g.tp==='mizer') resultText=`✓ ${pNames[bw]} MEGNYERTE: ${g.n} (1 vitel, nem 1. és nem utolsó)`;
      else if(g.tp==='pikkolo') resultText=`✓ ${pNames[bw]} MEGNYERTE: ${g.n} (2 vitel, nem egymás után)`;
      else resultText=`✓ ${pNames[bw]} MEGNYERTE: ${g.n} (${got}/${g.tgt} vitel)`;
      addLog(resultText);
    } else {
      if(g.tp==='betli'||g.tp==='mizer'||g.tp==='pikkolo'){
        const opp=[0,1,2].filter(i=>i!==bw);
        opp.forEach(o=>newCellar.push({from:o,to:bw,val:gameVal*5}));
        const reason=g.tp==='betli'?`${got} vitelt vitt`
          :g.tp==='mizer'?`${got} vitelt vitt${got===1?' (de első/utolsó volt)':''}`
          :`${got} vitelt vitt${got===2?' (egymás után)':''}`;
        resultText=`✗ ${pNames[bw]} MEGBUKOTT: ${g.n} (${reason}) – ellene: ${gameVal*5} pince/fő`;
        addLog(resultText);
      } else {
        ns[bw]-=gameVal;
        const opp=[0,1,2].filter(i=>i!==bw);
        const oppTotal=opp.reduce((s,i)=>s+finalTW[i],0);
        if(oppTotal<3){
          opp.forEach(o=>{
            if(finalTW[o]===0){
              ns[o]-=1;
              addLog(`${pNames[o]} megbukott (0 vitel, ellenfél bukás)`);
            }
          });
        }
        resultText=`✗ ${pNames[bw]} MEGBUKOTT: ${g.n} (${got}/${g.tgt} vitel)`;
      }
      addLog(resultText);
    }
  }

  // Következő osztó rotation
  const nextDealer=(state.dealerIdx+1)%3;
  state={...state,scores:ns,cellar:newCellar,resultMsg:resultText,phase:'result',dealerIdx:nextDealer};
  after();
}

function _mizerFirstOrLast(finalTW,pl){
  // Mizer: a vitel nem lehet sem az első (trickNum===1), sem az utolsó (trickNum===10) menet
  const history=state.trickHistory||[];
  const myWins=history.filter(t=>t.winner===pl);
  if(myWins.length!==1)return true; // nem pontosan 1 vitel → eleve bukott más okból
  const winTrick=myWins[0].trickNum;
  const maxTrick=history.length>0?Math.max(...history.map(t=>t.trickNum)):10;
  return winTrick===1||winTrick===maxTrick; // első vagy utolsó → bukott
}

function _pikkoloValid(pl){
  // Pikkoló: 2 vitel, de nem egymás után
  const history=state.trickHistory||[];
  const myWins=history.filter(t=>t.winner===pl).map(t=>t.trickNum).sort((a,b)=>a-b);
  if(myWins.length!==2)return false;
  return myWins[1]-myWins[0]>1; // egymás utáni → érvénytelen
}

function _calcFinalScore(pl){
  const own=state.scores[pl];
  const cellarSum=state.cellar.filter(c=>c.to===pl).reduce((s,c)=>s+c.val,0);
  return own - cellarSum/100;
}

// ═══ DECK ═════════════════════════════════════════════════
function _mkDeck(){return SUITS.flatMap(s=>VALS.map(v=>({s,v,id:`${s}_${v}`})));}
function _shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]];}return b;}

// ═══ HELYI AKCIÓK ════════════════════════════════════════════
function myBid(amount){
  if(state.phase!=='bid'||state.bidder!==myIndex)return;
  sendAction({kind:'bid',amount});
}
function myPickGame(g){
  if(state.phase!=='selectGame'||state.bidWinner!==myIndex)return;
  sendAction({kind:'pickGame',gameId:g.id});
}
function myEarlyBid(g){
  if(state.phase!=='bid'||state.bidder!==myIndex)return;
  sendAction({kind:'earlyBid',gameId:g.id});
}
function myDiscard(cardId){
  if(state.phase!=='discard'||state.bidWinner!==myIndex)return;
  if(state.liftedCard===cardId){
    state.liftedCard=null; sendAction({kind:'discard',cardId});
  } else {
    state={...state,liftedCard:cardId}; render();
  }
}
function myPlay(card){
  if(state.phase!=='play'||state.curP!==myIndex)return;
  if(!_isValidPlay(myIndex,card)){
    const g=state.game;
    const lead=state.trick[0]?.card.s;
    const hasSuit=state.hands[myIndex].some(c=>c.s===lead);
    if(hasSuit) state={...state,msg:`⚠️ Kötelező ${SI[lead]?.n||lead} színre menni!`};
    else state={...state,msg:'⚠️ Kötelező tromfot rakni, ha van!'};
    render(); return;
  }
  if(state.liftedCard===card.id){
    state.liftedCard=null; sendAction({kind:'play',cardId:card.id});
  } else {
    state={...state,liftedCard:card.id}; render();
  }
}

function _numPositions(n,W,H){
  const lx=W*0.28,rx=W*0.72,cx=W/2;
  const t1=H*0.22,t2=H*0.36,mid=H*0.5,b2=H*0.64,b1=H*0.78;
  const positions={
    7:[[lx,t1,0],[rx,t1,0],[lx,mid,0],[rx,mid,0],[cx,t2,0],[lx,b1,1],[rx,b1,1]],
    8:[[lx,t1,0],[rx,t1,0],[lx,mid,0],[rx,mid,0],[cx,t2,0],[lx,b1,1],[rx,b1,1],[cx,b2,1]],
    9:[[lx,t1,0],[rx,t1,0],[lx,t2,0],[rx,t2,0],[cx,mid,0],[lx,b2,1],[rx,b2,1],[lx,b1,1],[rx,b1,1]],
    10:[[lx,t1,0],[rx,t1,0],[lx,t2,0],[rx,t2,0],[cx,t2*0.7+mid*0.3,0],[lx,b2,1],[rx,b2,1],[lx,b1,1],[rx,b1,1],[cx,b2*0.7+t2*0.3+H*0.06,1]]
  };
  return positions[n]||[[cx,mid,0]];
}

function buildCardSVG(card,lifted,W,H){
  const svg=mkS('svg',{width:W,height:H,viewBox:`0 0 ${W} ${H}`});
  const si=SI[card.s]||SI.piros;
  const R=5;
  const isFigure=['A','F','K','Á'].includes(card.v);
  const isNumber=['7','8','9','10'].includes(card.v);
  const dispV=displayVal(card.v);
  const fontSize=dispV.length>2?7:10;
  // Pergamen háttér
  svg.appendChild(mkS('rect',{x:1,y:1,width:W-2,height:H-2,rx:R,ry:R,fill:'#fcf5e5',stroke:lifted?'#ffee58':si.col,'stroke-width':lifted?3:1.8}));
  svg.appendChild(mkS('rect',{x:3,y:3,width:W-6,height:H-6,rx:R-1,ry:R-1,fill:'none',stroke:si.col,opacity:'0.18','stroke-width':0.8}));
  if(lifted){svg.appendChild(mkS('rect',{x:2.5,y:2.5,width:W-5,height:H-5,rx:R-1,ry:R-1,fill:'none',stroke:'rgba(255,238,88,0.45)','stroke-width':1.2}));}
  // Bal felső sarok
  const vlbl=mkS('text',{x:3.5,y:13,'font-size':fontSize,'font-weight':'bold',fill:si.col,'font-family':'Georgia,serif'});vlbl.textContent=dispV;svg.appendChild(vlbl);
  drawSuit(svg,card.s,W-8,9,9);
  // Jobb alsó sarok (tükör)
  const g2=mkS('g',{transform:`rotate(180,${W/2},${H/2})`});
  const vlbl2=mkS('text',{x:3.5,y:13,'font-size':fontSize,'font-weight':'bold',fill:si.col,'font-family':'Georgia,serif'});vlbl2.textContent=dispV;g2.appendChild(vlbl2);
  drawSuit(g2,card.s,W-8,9,9);
  svg.appendChild(g2);
  // Kártya közepe
  if(isFigure&&card.v!=='Á'){
    drawSuit(svg,card.s,W/2,H*0.22,Math.min(W,H)*0.22);
    const gSym=mkS('g',{transform:`rotate(180,${W/2},${H/2})`});
    drawSuit(gSym,card.s,W/2,H*0.22,Math.min(W,H)*0.22);
    svg.appendChild(gSym);
    drawFigure(svg,card.v,card.s,W/2,H/2,W,H);
  } else if(card.v==='Á'){
    drawSuit(svg,card.s,W/2,H/2,Math.min(W,H)*0.62);
    svg.appendChild(mkS('circle',{cx:W/2,cy:H/2,r:Math.min(W,H)*0.35,fill:'none',stroke:si.col,opacity:'0.12','stroke-width':1.2,'stroke-dasharray':'3,3'}));
  } else if(isNumber){
    const n=parseInt(card.v);
    const positions=_numPositions(n,W,H);
    const symSize=Math.min(W,H)*0.2;
    positions.forEach(([px,py,flipped])=>{
      if(flipped){const gf=mkS('g',{transform:`rotate(180,${px},${py})`});drawSuit(gf,card.s,px,py,symSize);svg.appendChild(gf);}
      else{drawSuit(svg,card.s,px,py,symSize);}
    });
  }
  return svg;
}

function renderBack(W=30,H=46){
  const d=document.createElement('div'); d.style.cssText='display:inline-block;flex-shrink:0;';
  d.appendChild(buildBackSVG(W,H)); return d;
}

// ═══ RENDER KERETRENDSZER ════════════════════════════════════
function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==='style')Object.assign(e.style,v);else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);else e.setAttribute(k,v);});
  if(children)children.forEach(c=>{if(c!=null)e.appendChild(typeof c==='string'?document.createTextNode(c):c);});
  return e;
}
function div(s,ch){return el('div',{style:s},ch);}
function btn(s,cb,ch){return el('button',{style:{cursor:'pointer',...s},onClick:cb},ch);}
function inp(ph,val,onCh){const i=el('input',{type:'text',placeholder:ph});i.value=val||'';i.addEventListener('input',e=>onCh(e.target.value));return i;}

// ═══ RENDER ══════════════════════════════════════════════════
function render(){
  if(showRules){document.getElementById('app').innerHTML='';document.getElementById('app').appendChild(rRules());return;}
  const app=document.getElementById('app'); app.innerHTML='';
  if(netPhase==='lobby')      {app.appendChild(rLobby());return;}
  if(netPhase==='hosting')    {app.appendChild(rHosting());return;}
  if(netPhase==='ready')      {app.appendChild(rHosting());return;}
  if(netPhase==='joining')    {app.appendChild(rJoining());return;}
  if(netPhase==='waiting')    {app.appendChild(rWaiting());return;}
  if(netPhase==='disconnected'){app.appendChild(rDisconn());return;}
  app.appendChild(rGame());
}

function rGame(){

    ||(s.phase==='bid'&&s.bidder===myIndex)
    ||(s.phase==='discard'&&s.bidWinner===myIndex)

  // MÁS JÁTÉKOSOK KEZEI

    display:'flex',justifyContent:'space-around',padding:'6px 10px 4px',gap:'6px',flexShrink:'0'

      margin:'4px 8px',background:'rgba(0,0,0,0.25)',borderRadius:'10px',padding:'5px 8px',flexShrink:'0'

              ['⏳ Gazda indítja a következő kört...']),
        btn({background:'none',border:'1px solid rgba(255,255,255,0.15)',color:'rgba(255,255,255,0.4)',
             borderRadius:'50px',padding:'7px 18px',fontSize:'11px',width:'100%'},
          ()=>{netPhase='lobby';joinedCount=0;pConns=[null,null,null];hostConn=null;if(peer){peer.destroy();peer=null;}render();},[' ← Kilépés']),
      ]),
    ]));
  }

  return div({
    minHeight:'100vh',
    background:`linear-gradient(160deg,${DG} 0%,${G} 70%)`,
    display:'flex',flexDirection:'column',
    maxWidth:'480px',margin:'0 auto',position:'relative'
  },children);
}

// ═══ SZABÁLYZAT NÉZET ════════════════════════════════════════
function rRules(){
  const wrap=document.createElement('div');
  wrap.className='rules-modal';
  wrap.innerHTML=`
    <div class="rules-content">

        <button onclick="showRules=false;render();" style="background:rgba(255,255,255,0.1);border:none;color:white;padding:6px 14px;border-radius:20px;cursor:pointer;font-family:Georgia,serif;">✕ Bezár</button>

      <h2>Alapok</h2>
      <p>32 lapos magyar kártyával, 3 játékossal játszható. A lapok sorrendje: <strong>7, 8, 9, 10, Alsó (A), Felső (F), Király (K), Ász (Á)</strong>.</p>
      <p>Az első osztót sorsolással döntik el: mindenki húz egy lapot, aki pirosat húz, az az első osztó.</p>

      <h2>Osztás</h2>
      <p>Az osztó keveri, majd a balján ülővel vágatja. Ezután <strong>egyesével oszt 5-5 lapot</strong> (ha nincs vágás, 5-ösével), majd félretesz 2 lapot (<em>talon</em>). Végül a maradék 5-5 lapot is kiosztja. Mindenki 10 lapot kap.</p>

      <h2>Licitálás</h2>
      <p>Az osztótól jobbra ülő kezdi a licitet. Licitálni <strong>1-től kell kezdeni</strong>, és egyesével lehet haladni. A játékok értéke és sorrendje:</p>
      <table>
        <tr><th>Érték</th><th>Játék</th><th>Típus</th></tr>
        <tr><td>2</td><td>Zöld (lapi)</td><td>Tromf (zöld)</td></tr>
        <tr><td>3</td><td>Sárga (tök)</td><td>Tromf (sárga)</td></tr>
        <tr><td>4</td><td>Piros (szív)</td><td>Tromf (piros)</td></tr>
        <tr><td>5</td><td>Makk</td><td>Tromf (makk)</td></tr>
        <tr><td>6</td><td>Betli</td><td>Különleges</td></tr>
        <tr><td>7</td><td>Mizer</td><td>Különleges</td></tr>
        <tr><td>8</td><td>Szanadu</td><td>Különleges</td></tr>
        <tr><td>9</td><td>Pikkoló</td><td>Különleges</td></tr>
        <tr><td>10</td><td>Preferansz</td><td>Különleges</td></tr>
      </table>
      <p>Aki megnyeri a licitet, megkapja és megnézi a talont (mindenki látja), majd felveszi, és eldönti a játékot. 2 lapot le kell raknia.</p>

      <h2>Különleges licitálási esetek</h2>
      <ul>
        <li><strong>Korai játék:</strong> Az első 5 lap után be lehet mondani játékot. Ebben az esetben az értéke <strong>megduplázódik</strong>, de a talont nem lehet felvenni.</li>
        <li><strong>„Játék" mondása:</strong> Ha valaki talon nélkül szeretne játszani. Fölé lehet licitálni. Aki már mondott rendes licitet, nem mondhat Játékot.</li>
        <li><strong>Körpassz:</strong> Ha mindenki passzol, az osztó kijátsza a talon 2 lapját, mindenki látja. Az elvitt vitelek számát le kell vonni a saját pontszámból.</li>
      </ul>

      <h2>Játéktípusok</h2>
      <h3>Színjátékok (Zöld, Sárga, Piros, Makk)</h3>
      <p>A licitnyertesnek legalább <strong>6 vitelt</strong> kell szereznie a 10-ből. Az a szín a tromf, amit a licitnyertes választott. A legkisebb tromf is veri a többi szín legnagyobb lapját. Mindig az osztótól jobbra ülő kezd.</p>
      <p>Kötelező azonos színre menni. Ha nincs, kötelező tromfot rakni (ha van).</p>

      <p>A licitnyertes célja <strong>pontosan 2 vitel</strong>, amelyek nem lehetnek egymás után (de lehet az első és az utolsó is).</p>

        <li><strong>Ha a licitnyertes bukott:</strong> saját pontjához hozzáadódik a játék értéke (pl. -10 → -15). Betli/Mizer/Pikkoló esetén az ellenfél mind a ketten a játék értékének 5-szörösét írják a pincébe a vesztesnek.</li>

      <div style="text-align:center;margin-top:20px;">
        <button onclick="showRules=false;render();" style="background:#f9a825;color:#1a1a1a;border:none;border-radius:20px;padding:10px 28px;font-size:14px;font-weight:bold;cursor:pointer;font-family:Georgia,serif;">← Vissza a játékhoz</button>
      </div>
    </div>
  `;
  return wrap;
}
