<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#082808"/>
  <title>Preferansz – Többjátékos</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div id="app">
    <div class="loading">Betöltés...</div>
  </div>

  <script>
    // PeerJS betöltése – ha az első CDN nem működik, próbálja a másikat
    function loadPeerJS(callback) {
      var cdnList = [
        'https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js',
        'https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js',
        'https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js'
      ];
      var idx = 0;
      function tryNext() {
        if (idx >= cdnList.length) {
          document.getElementById('app').innerHTML =
            '<div style="color:#ff8a65;padding:32px;font-family:Georgia,serif;text-align:center;font-size:14px;">' +
            '<div style="font-size:40px;margin-bottom:12px;">⚠️</div>' +
            '<b>Nem sikerült betölteni a hálózati modult.</b><br><br>' +
            'Ellenőrizd az internetkapcsolatot,<br>majd frissítsd az oldalt!' +
            '<br><br><button onclick="location.reload()" style="background:#f9a825;border:none;border-radius:8px;padding:12px 28px;font-size:15px;font-family:Georgia,serif;cursor:pointer;">🔄 Újratöltés</button>' +
            '</div>';
          return;
        }
        var s = document.createElement('script');
        s.src = cdnList[idx++];
        s.onload = callback;
        s.onerror = tryNext;
        document.head.appendChild(s);
      }
      tryNext();
    }

    loadPeerJS(function() {
      // PeerJS betöltve – most töltjük a játékot
      var s = document.createElement('script');
      s.src = 'script.js';
      s.onerror = function() {
        document.getElementById('app').innerHTML =
          '<div style="color:#ff8a65;padding:32px;font-family:Georgia,serif;text-align:center;">' +
          '<b>Hiba: script.js nem töltődött be.</b><br><br>' +
          'Ellenőrizd hogy a script.js fájl feltöltve van-e GitHub-ra!' +
          '</div>';
      };
      document.head.appendChild(s);
    });
  </script>
</body>
</html>
